feed:
  title: "My Reading Feed"
  description: "Articles converted to audio"
  cover: "cover.jpg"

voice:
  default: "af_heart"
  speed: 1.0

tts:
  engine: kokoro
  base_url: "http://localhost:8880/v1"
  max_parallel: 4

publisher:
  type: github_pages
  repo: "username/audibleweb-feed"
  branch: "gh-pages"
  max_episodes: 0     # 0 = unlimited; set to rotate out oldest episodes
  max_size_mb: 900    # GitHub Pages recommended limit; 0 = no size check

extraction:
  jina_fallback: true
  jina_api_key: ""
  rss_feeds: [] # URLs to poll for new articles
  rss_poll_interval: 3600 # seconds between polls

normalization:
  llm_enabled: true
  llm_base_url: ""
  llm_model: ""

server:
  host: "0.0.0.0"
  port: 5000
  api_key: ""
